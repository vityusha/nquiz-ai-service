name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # 1. Tests (run allways)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Run tests
        run: ./gradlew test

  # 2. Build image (run only after tests)
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build JAR with Gradle
        run: ./gradlew shadowJar -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  # 3. DEPLOY (run only after successful build and only for main)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # IMPOTANT: this step is raise only if push main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy on VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          DEPLOY_USER="${VPS_USER:-deploy}"
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -p ${VPS_PORT} -i /tmp/deploy_key -o StrictHostKeyChecking=no "${DEPLOY_USER}@${VPS_HOST}" <<EOF
          set -euo pipefail
          cd /opt/nquiz-ai-service
          export IMAGE=${IMAGE_NAME}:latest
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          EOF