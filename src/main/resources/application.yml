micronaut:
  application:
    name: nquiz-ai-service
  messages:
    basename: i18n/messages
  server:
    default-charset: UTF-8
    response:
      default-charset: UTF-8
  data:
    jdbc:
      enable-sql-logging: false
      dialect: H2
      operations:
        enable-read-only: false
  router:
    static-resources:
      default:
        enabled: true
        mapping: "/**"
        paths: "classpath:public"

jackson:
  default-charset: UTF-8

netty:
  default-charset: UTF-8

llm:
  groq:
    url: https://api.groq.com/openai/v1/chat/completions
    model: llama-3.1-70b-versatile
  openai:
    url: https://api.openai.com/v1/chat/completions
    model: gpt-4o-mini
  deepseek:
    url: https://api.deepseek.com/chat/completions
    model: deepseek-v4-flash
  gemini:
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent
    model: gemini-2.5-flash

datasources:
  default:
    url: jdbc:sqlite:/data/nquiz-ai-service.db
    driverClassName: org.sqlite.JDBC
    username: ""
    password: ""
    readOnly: false
    options:
      autoCommit: true
      readOnly: false
    hikari:
      readOnly: false
      isReadOnly: false
    connectionProperties:
      journal_mode: WAL
      synchronous: NORMAL

flyway:
  datasources:
    default:
      enabled: true

kind: Application
