difficulty.B2=B2 — Выше среднего
difficulty.B2.desc=Более сложные конструкции, глубокий анализ.

difficulty.C1=C1 — Продвинутый
difficulty.C1.desc=Сложные задания, нюансированное понимание.

difficulty.C2=C2 — Профессиональный
difficulty.C2.desc=Максимальная сложность, абстрактное мышление.

