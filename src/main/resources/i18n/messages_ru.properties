type.TRANSFORMATION=Преобразование предложений
type.TRANSFORMATION.desc=Переформулирование предложений с сохранением смысла.

type.GAP_FILLING=Заполнение пропусков
type.GAP_FILLING.desc=Вставка подходящих слов или грамматических форм.

type.WORD_ORDER=Порядок слов
type.WORD_ORDER.desc=Правильное расположение слов в предложении.

type.PRONUNCIATION=Произношение
type.PRONUNCIATION.desc=Ударение, транскрипция, различия похожих слов.

type.REAL_LIFE=Живой английский
type.REAL_LIFE.desc=Разговорные выражения, сленг, бытовые ситуации.

