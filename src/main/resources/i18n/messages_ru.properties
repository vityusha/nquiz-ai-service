# -------------------------
# Difficulty Levels
# -------------------------
difficulty.A1=A1 — Начальный
difficulty.A1.desc=Простые фразы, базовые конструкции, элементарное понимание.

difficulty.A2=A2 — Базовый
difficulty.A2.desc=Простые задания, знакомые темы, короткие формулировки.

difficulty.B1=B1 — Средний
